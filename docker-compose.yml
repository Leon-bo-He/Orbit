services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orbit
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orbit_test
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: secret
    ports: ["5433:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    ports: ["8080:8080"]
    depends_on: [postgres]

volumes:
  postgres_data:
  redis_data:
